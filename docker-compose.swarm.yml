# Deploy with:
# GIT_USER="<your name>" GIT_EMAIL="<your email>" FOLDER="/home/user/code" \
#   docker stack deploy -c docker-compose.swarm.yml gastown

services:
  gastown:
    image: xerktech/gastown:latest
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
      - FOWNER
      - NET_RAW
    environment:
      IS_SANDBOX: 1
      GIT_USER: ${GIT_USER:-TestUser}
      GIT_EMAIL: ${GIT_EMAIL:-test@example.com}
    volumes:
      - agent-home:/home/agent
      - ${FOLDER}:/gt
    ports:
      - target: 8080
        published: ${DASHBOARD_PORT:-8080}
        protocol: tcp
        mode: ingress
    command: sleep infinity
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s

volumes:
  agent-home:

name: Nightly Rebase from Upstream

on:
  schedule:
    # Run every night at midnight UTC
    - cron: '0 0 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  rebase:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: git remote add upstream https://github.com/steveyegge/gastown.git

      - name: Fetch upstream
        run: git fetch upstream

      - name: Rebase onto upstream main
        run: |
          git checkout main
          git rebase upstream/main

      - name: Push changes
        run: git push origin main --force-with-lease
